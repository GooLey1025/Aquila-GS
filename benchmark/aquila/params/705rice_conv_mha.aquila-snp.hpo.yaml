hpo:
  enabled: true
  method: grid_search
  metric: best/val_r
  direction: maximize
  seed: 42
  parameters:
    train.learning_rate:
      type: categorical
      choices: [1.0e-3, 1.0e-4]
    # train.scheduler_params.warmup_epochs:
    #   type: categorical
    #   choices: [10, 15, 20, 25]
    # train.weight_decay:
    #   type: categorical
    #   choices: [1e-3, 1e-4, 1e-5]
    # train.scheduler_params.min_lr:
    #   type: categorical
    #   choices: [0, 1e-5, 1e-6]
    

train:
  batch_size: 32
  optimizer_type: adamw
  weight_decay: 1e-4
  loss_type: mse
  normalize_regression: true
  uncertainty_weighting: true
  early_stopping_patience: 40
  # Ignore tiny valid_r gains; still consume early-stopping patience.
  early_stopping_min_delta: 0.0001
  # clip_grad_norm_ syncs each step (~1–2pp util); null favors sustained ~99%.
  gradient_clip_norm: null
  scheduler_type: cosine_warmup
  learning_rate: 1e-3
  num_epochs: 200
  scheduler_params:
    warmup_epochs: 10
    warmup_start_factor: 0.01
    min_lr: 1e-6
  val_split: 0.1
  test_split: 0.0
  # Keep fold subsets on GPU. If your batch is large, keep this false.
  gpu_resident: true
  # AMP dtype: bf16 enables autocast; fp32 disables it.
  precision: bf16

model:
  architecture_type: single
  activation: gelu
  dropout: 0.1
  l2_scale: 1.0e-05
  verbose: false
  embedder:
  - name: conv_block
    in_channels: 8
    out_channels: 256
    kernel_size: 15
    activation: gelu
    norm_type: layer
    residual: false
  trunk:
  - name: down_conv_tower
    in_channels: 256
    out_channels: 256
    kernel_size: 5
    padding: 2
    activation: gelu
    dropout: 0.1
    norm_type: layer
    order: nac
    residual: true
    seq_len_threshold: 1500
  - name: transformer
    d_model: 256
    num_heads: 8
    d_ff: 256
    dropout: 0.1
    activation: gelu
  - name: multi_head_pool
    d_model: 256
    num_heads: 4
    dropout: 0.1
    pool_axis: 2

  heads:
    regression:
    - name: regression_head
      in_features: null
      num_targets: 18
      hidden_features: 256
      dropout: 0.1
      activation: gelu
