output_dir: 705rice_conv_train_out
data:
  geno_file: 705rice_data/705Rice_Inbred_ssSNP_0.5LD.ID.reheader.vcf
  pheno_file: 705rice_data/705Rice.pheno.imputed.tsv #705rice_data/705Rice.phenos.completed.tsv
  encoding_type: snp_vcf
  classification_tasks: null


hpo:
  enabled: true
  n_trials: 500
  metric: best/val_r
  direction: maximize
  seed: 42
  
  parameters:
    # Training hyperparameters
    train.learning_rate:
      type: log_uniform
      low: 1.0e-5
      high: 1.0e-3
    
    train.weight_decay:
      type: log_uniform
      low: 1.0e-6
      high: 1.0e-2

    train.batch_size:
      type: categorical
      choices: [16, 32, 64]

    train.gradient_clip_norm:
      type: categorical
      choices: [0.5, 1.0, 2.0, 5.0]

    train.scheduler_params.warmup_epochs:
      type: categorical
      choices: [5, 10, 15, 20, 30]
    
    train.scheduler_params.warmup_start_factor:
      type: log_uniform
      low: 1.0e-3
      high: 1.0e-2

    train.scheduler_params.min_lr:
      type: log_uniform
      low: 1.0e-7
      high: 1.0e-4

    model.embedder.0.kernel_size:
      type: categorical
      choices: [3, 5, 7, 9, 11, 13, 15]
    
    model.trunk.0.dropout:
      type: uniform
      low: 0.0
      high: 0.35
    
    model.trunk.0.kernel_size:
      type: categorical
      choices: [3, 5, 7, 9]
    

    model.trunk.1.dropout:
      type: uniform
      low: 0.0
      high: 0.35

    model.trunk.1.kernel_size:
      type: categorical
      choices: [3, 5, 7, 9]

    model.trunk.2.dropout:
      type: uniform
      low: 0.0
      high: 0.35

    model.trunk.2.kernel_size:
      type: categorical
      choices: [3, 5, 7, 9]

    model.trunk.3.dropout:
      type: uniform
      low: 0.0
      high: 0.35

    model.trunk.3.kernel_size:
      type: categorical
      choices: [3, 5, 7, 9]


    model.trunk.4.dropout:
      type: uniform
      low: 0.0
      high: 0.35

    model.trunk.4.kernel_size:
      type: categorical
      choices: [3, 5, 7, 9]

    model.trunk.5.dropout:
      type: uniform
      low: 0.0
      high: 0.35

    model.trunk.5.kernel_size:
      type: categorical
      choices: [3, 5, 7, 9]

    model.trunk.6.dropout:
      type: uniform
      low: 0.0
      high: 0.35
    
    model.trunk.6.num_heads:
      type: categorical
      choices: [4, 8]
    
    model.trunk.6.d_ff:
      type: categorical
      choices: [256, 512, 1024]

    model.trunk.7.dropout:
      type: uniform
      low: 0.0
      high: 0.35

    model.heads.regression.0.hidden_features:
      type: categorical
      choices: [128, 256, 512]
    
    model.heads.regression.0.dropout:
      type: uniform
      low: 0.0
      high: 0.4

    model.l2_scale:
      type: log_uniform
      low: 1.0e-7
      high: 1.0e-3

train:
  batch_size: 32
  num_epochs: 300
  learning_rate: 0.0001
  weight_decay: 0.001
  optimizer_type: adamw
  loss_type: mse
  normalize_regression: true
  uncertainty_weighting: true
  early_stopping_patience: 40
  gradient_clip_norm: 1.0
  scheduler_type: cosine_warmup
  scheduler_params:
    warmup_epochs: 10
    warmup_start_factor: 0.01
    min_lr: 1.0e-05
  val_split: 0.1
  test_split: 0.0
  num_workers: 4
model:
  architecture_type: single
  activation: gelu
  dropout: 0.1
  l2_scale: 1.0e-05
  verbose: true
  embedder:
  - name: conv_block
    in_channels: 8
    out_channels: 256
    kernel_size: 15
    activation: gelu
    norm_type: layer
    residual: false
  trunk:
  - name: conv_block
    order: nac
    out_channels: 256
    kernel_size: 5
    padding: 2
    activation: gelu
    dropout: 0.1
    norm_type: layer
    residual: true
  - name: conv_block
    order: nac
    stride: 2
    out_channels: 256
    kernel_size: 5
    padding: 2
    activation: gelu
    dropout: 0.1
    norm_type: layer
    residual: true
  - name: conv_block
    order: nac
    out_channels: 256
    kernel_size: 5
    padding: 2
    activation: gelu
    dropout: 0.1
    norm_type: layer
    residual: true
  - name: conv_block
    order: nac
    stride: 2
    out_channels: 256
    kernel_size: 5
    padding: 2
    activation: gelu
    dropout: 0.1
    norm_type: layer
    residual: true

  - name: conv_block
    order: nac
    out_channels: 256
    kernel_size: 5
    padding: 2
    activation: gelu
    dropout: 0.1
    norm_type: layer
    residual: true
  - name: conv_block
    order: nac
    stride: 2
    out_channels: 256
    kernel_size: 5
    padding: 2
    activation: gelu
    dropout: 0.1
    norm_type: layer
    residual: true

  - name: transformer
    d_model: 256
    num_heads: 8
    d_ff: 256
    dropout: 0.1
    activation: gelu
    
  # - name: transformer_tower_mqa
  #   embed_dim: 256
  #   num_query_heads: 8
  #   repeat: 1
  #   dropout: 0.1
  #   activation: gelu
  #   use_rope: false
  - name: multi_head_pool
    d_model: 256
    num_heads: 4
    dropout: 0.1
    pool_axis: 2
  heads:
    regression:
    - name: regression_head
      in_features: null
      num_targets: 18
      hidden_features: 256
      dropout: 0.1
      activation: gelu
